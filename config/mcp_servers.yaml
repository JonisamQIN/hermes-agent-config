# MCP Servers Configuration for Hermes Agent
# These servers will be automatically connected on startup

# 1. Time Server - Simple server for testing
time:
  command: "npx"
  args: ["-y", "@modelcontextprotocol/server-time"]
  timeout: 30
  connect_timeout: 15

# 2. Filesystem Server - Access local filesystem
filesystem:
  command: "npx"
  args: ["-y", "@modelcontextprotocol/server-filesystem", "/root"]
  timeout: 60
  connect_timeout: 20

